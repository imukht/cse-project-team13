<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | Embark</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="home-shell">
      <header class="home-header">
        <div class="brand-block">
          <img src="logo.png" alt="Embark logo" class="logo" />
          <div>
            <p class="eyebrow">Profile</p>
            <h1>My Account</h1>
          </div>
        </div>
      </header>

      <section class="hero-card" aria-labelledby="profile-title">
        <div>
          <p class="eyebrow">Account overview</p>
          <h2 id="profile-title">Manage your breeder profile and dog portfolio from one place.</h2>
        </div>
      </section>

      <section class="dog-list" aria-label="Profile details">
        <article class="info-card">
          <h3>Owner Info</h3>
          <form id="profile-form" class="editor-form">
            <label>
              <span>Name</span>
              <input type="text" name="name" required />
            </label>
            <label>
              <span>Email</span>
              <input type="email" name="email" required />
            </label>
            <label>
              <span>Dogs Listed</span>
              <input type="number" name="dogsListed" min="0" required />
            </label>
            <div class="form-actions">
              <button type="submit">Save Profile</button>
            </div>
            <p id="profile-status" class="form-status"></p>
          </form>
        </article>
      </section>

      <nav class="bottom-nav" aria-label="Primary">
        <a class="nav-item" href="homepage.html">Home</a>
        <a class="nav-item" href="saved-dogs.html">Saved Dogs</a>
        <a class="nav-item" href="pedigrees.html">Pedigrees</a>
        <a class="nav-item active" href="profile.html">Profile</a>
      </nav>
    </main>

    <script src="script.js"></script>
  </body>
</html>
