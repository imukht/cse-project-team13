<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Embark Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="home-shell">
      <header class="home-header">
        <div class="brand-block">
          <img src="logo.png" alt="Embark logo" class="logo" />
          <div>
            <p class="eyebrow">Dog Profiles</p>
            <h1>My Dogs</h1>
          </div>
        </div>

        <div class="header-actions">
          <a class="icon-btn" href="notifications.html" aria-label="Notifications">🔔</a>
          <a class="icon-btn" href="settings.html" aria-label="Settings">⚙️</a>
        </div>
      </header>

      <section class="hero-card" aria-labelledby="home-title">
        <div>
          <p class="eyebrow">Welcome back</p>
          <h2 id="home-title">Track lineage and manage every profile in one place.</h2>
        </div>
        <button class="primary-btn" id="toggle-add-dog-form" type="button">Add Dog</button>
      </section>

      <section class="info-card" aria-label="Add dog form">
        <form id="add-dog-form" class="editor-form hidden">
          <label>
            <span>Name</span>
            <input type="text" name="name" required />
          </label>
          <label>
            <span>Breed</span>
            <input type="text" name="breed" required />
          </label>
          <label>
            <span>Birthdate</span>
            <input type="date" name="birthdate" required />
          </label>
          <label>
            <span>Sex</span>
            <input type="text" name="sex" required />
          </label>
          <label>
            <span>Photo URL</span>
            <input type="url" name="photo" />
          </label>
          <div class="form-actions">
            <button type="submit">Add Dog</button>
            <button type="button" class="secondary-btn" id="cancel-add-dog">Cancel</button>
          </div>
          <p id="add-dog-status" class="form-status"></p>
        </form>
      </section>

      <section id="dog-list" class="dog-list" aria-label="Dog profiles"></section>

      <nav class="bottom-nav" aria-label="Primary">
        <a class="nav-item active" href="homepage.html">Home</a>
        <a class="nav-item" href="saved-dogs.html">Saved Dogs</a>
        <a class="nav-item" href="pedigrees.html">Pedigrees</a>
        <a class="nav-item" href="profile.html">Profile</a>
      </nav>
    </main>

    <script src="script.js"></script>
  </body>
</html>
