<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | Embark</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="login-card" aria-labelledby="signup-title">
        <div class="brand">
          <img src="logo.png" alt="Embark logo" class="logo" />
          <h1 id="signup-title">Create your account</h1>
          <p>Start your journey with Embark.</p>
        </div>

        <form id="signup-form" class="login-form">
          <label class="field">
            <span>Full Name</span>
            <input type="text" name="fullName" placeholder="Jane Doe" required />
          </label>

          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="you@example.com" required />
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" name="password" placeholder="Create a password" required />
          </label>

          <label class="field">
            <span>Confirm Password</span>
            <input type="password" name="confirmPassword" placeholder="Re-enter your password" required />
          </label>

          <button type="submit">Create Account</button>
        </form>

        <p class="footer-text">
          Already have an account?
          <a href="login.html">Sign in</a>
        </p>
      </section>
    </main>
  </body>
</html>
